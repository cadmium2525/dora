<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小太りドラちゃん脱衣ブロック崩し</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- ゲーム用Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- UIレイヤー -->
        <div id="ui-layer">
            <div id="score-board">SCORE: <span id="score">0</span></div>
            <div id="life-board">LIFE: <span id="life">3</span></div>
        </div>

        <!-- タイトル画面 -->
        <div id="screen-title" class="screen active">
            <h1>小太りドラちゃん<br><span>脱衣ブロック崩し</span></h1>
            <p>タップしてスタート！<br>スワイプで扇風機を操作し<br>ドラちゃんの冬着を吹き飛ばせ！</p>
            <button id="start-btn">ゲームスタート</button>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="screen-gameover" class="screen">
            <h1>GAME OVER</h1>
            <p>ドラちゃんの服を脱がしきれなかった…</p>
            <button id="retry-btn">もう一度挑戦する</button>
        </div>

        <!-- クリア画面 -->
        <div id="screen-clear" class="screen">
            <h1>CLEAR!!</h1>
            <p>見事にドラちゃんを全裸にした！</p>
            <button id="next-btn">さらに遊ぶ</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
